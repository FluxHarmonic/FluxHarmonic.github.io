name: Publish to GitHub Pages

on:
  push:
    branches:
      - master
      - relight-2026
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Install Sigil
        run: |
          curl -fsSL -o sigil \
            https://codeberg.org/sigil/sigil/releases/download/v0.17.1/sigil-linux-amd64-static
          chmod +x sigil
          sudo mv sigil /usr/local/bin/sigil
          sigil --version

      - name: Install dependencies
        run: sigil deps install

      - name: Build the site
        run: |
          sigil build
          sigil run -- build

      - name: Preserve custom domain
        run: cp CNAME public/CNAME

      - name: Publish generated content to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
